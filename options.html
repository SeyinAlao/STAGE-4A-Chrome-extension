<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 400px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #10a37f; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0d8c6d; }
    #status { color: green; margin-top: 10px; display: none; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Settings</h2>
  <label for="apiKey">OpenAI API Key</label>
  <input type="password" id="apiKey" placeholder="sk-..." />
  <button id="saveBtn">Save Key</button>
  <div id="status">Key saved securely!</div>

  <script src="options.js"></script>
</body>
</html>
